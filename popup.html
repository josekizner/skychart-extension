<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; font-family: 'Segoe UI', sans-serif; padding: 16px; background: #1a1f2e; color: #e2e8f0; }
    h2 { font-size: 15px; color: #fff; margin: 0 0 12px 0; display: flex; align-items: center; gap: 8px; }
    .logo { width: 24px; height: 24px; border-radius: 4px; }
    .status-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; padding: 8px 10px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); border-radius: 8px; font-size: 12px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }
    .section { margin-bottom: 14px; }
    .section-title { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 4px; }
    input[type="email"], input[type="text"] {
      width: 100%; box-sizing: border-box; padding: 7px 10px; font-size: 12px;
      background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #fff;
      outline: none; transition: border 0.2s;
    }
    input:focus { border-color: #3b82f6; }
    .btn { display: block; width: 100%; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: background 0.2s; }
    .btn-save { background: #3b82f6; color: #fff; margin-top: 8px; }
    .btn-save:hover { background: #2563eb; }
    .saved-msg { display: none; color: #10b981; font-size: 11px; text-align: center; margin-top: 6px; }
    .agents { display: flex; flex-wrap: wrap; gap: 6px; }
    .agent-badge { padding: 4px 10px; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); border-radius: 12px; font-size: 11px; color: #93c5fd; }
    .footer { font-size: 10px; color: #475569; text-align: center; margin-top: 14px; border-top: 1px solid #1e293b; padding-top: 10px; }
  </style>
</head>
<body>
  <h2><img src="icon48.png" class="logo"> Skychart AI</h2>

  <div class="status-bar">
    <div class="status-dot"></div>
    <span>Extensão ativa</span>
  </div>

  <div class="section">
    <div class="section-title">Agentes ativos</div>
    <div class="agents">
      <span class="agent-badge">📄 Câmbio</span>
      <span class="agent-badge">🔍 Serasa</span>
      <span class="agent-badge">🚢 Frete</span>
      <span class="agent-badge">📦 Tracking</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">⚙️ Configurações - Alerta de Frete</div>
    <label for="pricing-email">E-mail do Pricing:</label>
    <input type="email" id="pricing-email" placeholder="email@empresa.com.br">
    <button class="btn btn-save" id="save-btn">Salvar</button>
    <div class="saved-msg" id="saved-msg">✅ Salvo com sucesso!</div>
  </div>

  <div class="footer">Mond Shipping &bull; v2.1</div>

  <script>
    var defaultEmail = 'paulo.zanella@mondshipping.com.br';
    var emailInput = document.getElementById('pricing-email');
    var saveBtn = document.getElementById('save-btn');
    var savedMsg = document.getElementById('saved-msg');

    // Carrega email salvo
    chrome.storage.local.get('pricingEmail', function(data) {
      emailInput.value = data.pricingEmail || defaultEmail;
    });

    // Salva
    saveBtn.addEventListener('click', function() {
      var email = emailInput.value.trim();
      if (!email || !email.includes('@')) {
        emailInput.style.borderColor = '#ef4444';
        return;
      }
      chrome.storage.local.set({ pricingEmail: email }, function() {
        savedMsg.style.display = 'block';
        saveBtn.textContent = '✅ Salvo!';
        setTimeout(function() {
          savedMsg.style.display = 'none';
          saveBtn.textContent = 'Salvar';
        }, 2000);
      });
    });
  </script>
</body>
</html>
