<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="64" fill="#080B12"/>
  <defs>
    <linearGradient id="visor" x1="160" y1="225" x2="352" y2="265" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="shell" x1="100" y1="60" x2="412" y2="452" gradientUnits="userSpaceOnUse">
      <stop stop-color="#64748B"/>
      <stop offset="0.5" stop-color="#475569"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer shell -->
  <path d="M256 60 L408 158 L408 340 L320 452 L192 452 L104 340 L104 158 Z" 
        fill="url(#shell)" stroke="#64748B" stroke-width="3"/>

  <!-- Inner face plate -->
  <path d="M256 100 L376 180 L376 310 L298 420 L214 420 L136 310 L136 180 Z" 
        fill="#1E293B" stroke="#334155" stroke-width="2"/>

  <!-- Visor -->
  <path d="M168 228 L344 228 L328 272 L184 272 Z" 
        fill="url(#visor)" filter="url(#glow)" opacity="0.95"/>

  <!-- Visor inner line -->
  <line x1="192" y1="250" x2="320" y2="250" stroke="#FDE68A" stroke-width="2" opacity="0.5"/>

  <!-- Chin plate -->
  <path d="M208 316 L304 316 L292 368 L220 368 Z" 
        fill="#334155" stroke="#475569" stroke-width="1.5"/>

  <!-- Side panels -->
  <path d="M104 198 L136 186 L136 292 L104 280 Z" fill="#334155" stroke="#475569" stroke-width="1"/>
  <path d="M408 198 L376 186 L376 292 L408 280 Z" fill="#334155" stroke="#475569" stroke-width="1"/>

  <!-- Top crest -->
  <path d="M236 60 L256 28 L276 60" stroke="#F59E0B" stroke-width="4" fill="none" filter="url(#glow)"/>

  <!-- Side accents -->
  <line x1="112" y1="220" x2="130" y2="220" stroke="#F59E0B" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="382" y1="220" x2="400" y2="220" stroke="#F59E0B" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Core chest indicator -->
  <circle cx="256" cy="392" r="10" fill="#F59E0B" filter="url(#glowStrong)" opacity="0.85"/>
</svg>
